<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RRF Parser Backend</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }
    .wrap {
      max-width: 760px;
      margin: 48px auto;
      padding: 24px;
      background: #fff;
      border: 1px solid #d6deea;
      border-radius: 12px;
    }
    code { background: #eef2f9; padding: 2px 6px; border-radius: 6px; }
    a { color: #2563eb; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>RRF Parser Backend</h1>
    <p>This repository provides a FastAPI backend for parsing <code>.rrf</code> files.</p>
    <p>GitHub Pages serves static files only, so the API itself is not hosted on Pages.</p>
    <p>Run the backend locally with:</p>
    <p><code>uvicorn app.main:app --reload --port 8000</code></p>
    <p>Then open <code>http://localhost:8000/</code> for the upload UI.</p>
  </div>
</body>
</html>
